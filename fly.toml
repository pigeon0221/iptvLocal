app = 'iptvlocal'
primary_region = 'iad'

[build]
  image = 'rebeliptv/iptv:latest'

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
